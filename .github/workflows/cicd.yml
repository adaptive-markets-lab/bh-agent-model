name: CI/CD Pipeline

on:
  pull_request:
    types: [opened, synchronize, closed] # Triggers for PRs
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Linting and formatting checks with ruff
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'adaptive-markets-lab/bh-agent-model' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install ruff==0.8.6
      - name: Run ruff linter checks
        run: ruff check .
      - name: Run ruff formatter checks
        run: ruff format --check .